name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: howl-linux-x64.tar.gz
          - os: macos-latest
            asset: howl-macos.zip
          - os: windows-latest
            asset: howl-windows-x64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # JUCE needs these dev headers on Linux
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev

      # Ninja needs cl.exe on PATH to set up the MSVC environment
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      # Separate cache key from build.yml: this configures Release, not the
      # default (debug-ish) config, so the two must not share a build dir
      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-release-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-build-release-

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package (Linux)
        if: runner.os == 'Linux'
        working-directory: build/src/app/Howl_artefacts/Release
        run: tar -czf "$GITHUB_WORKSPACE/${{ matrix.asset }}" Howl

      - name: Package (Linux AppImage)
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # linuxdeploy's bundled strip cannot read the relr.dyn section modern
          # binutils emits, and aborts the whole deployment on that mismatch alone
          NO_STRIP: "1"
        run: |
          mkdir -p AppDir/usr/bin
          cp build/src/app/Howl_artefacts/Release/Howl AppDir/usr/bin/Howl
          curl -L -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --executable AppDir/usr/bin/Howl \
            --desktop-file packaging/howl.desktop \
            --icon-file packaging/howl.png \
            --output appimage
          mv Howl-*.AppImage howl-linux-x64.AppImage

      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: build/src/app/Howl_artefacts/Release
        run: zip -r "$GITHUB_WORKSPACE/${{ matrix.asset }}" Howl.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path build/src/app/Howl_artefacts/Release/Howl.exe -DestinationPath ${{ matrix.asset }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ${{ matrix.asset }} --clobber --repo ${{ github.repository }}

      - name: Upload AppImage to release
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} howl-linux-x64.AppImage --clobber --repo ${{ github.repository }}
